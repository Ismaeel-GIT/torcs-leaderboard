<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORCS UK Leaderboard</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            background-color: #0b1a8f;
            font-family: Arial, sans-serif;
            color: white;
        }

        .leaderboard-container {
            position: relative;
            width: 100%;
            max-width: 1920px;
            margin: 0 auto;
            aspect-ratio: 16 / 9;
            background-image: url('blank-board.png');
            background-size: cover;
            background-position: center;
        }

        .data-overlay {
            position: absolute;
            top: 28.1%;    
            bottom: 13.8%; 
            left: 13.6%;   
            right: 9.3%;   
            display: grid;
            grid-template-rows: repeat(10, 1fr); 
        }

        .row {
            display: grid;
            grid-template-columns: 9.5% 15.5% 12.5% 15% 9.5% 18% 20%;
            height: 100%;
            min-height: 0; 
        }

        .cell {
            display: flex;
            justify-content: center; 
            align-items: center;     
            font-size: 1.05vw; 
            font-weight: 500; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            text-align: center;
        }

        .cell img {
            max-height: 2vw !important; 
            width: auto !important;   
            margin: 0 4px; 
            object-fit: contain;
            /* This zooms the image to size. */
            transform: scale(3.4); 
        }

        .vid-cell {
            position: relative;
            cursor: pointer;
            display: block;
            width: 100%;
            height: 100%;
        }

        .video-link {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            text-decoration: none;
        }
        
        .vid-cell:hover { background-color: rgba(255,255,255,0.05); }

    </style>
</head>
