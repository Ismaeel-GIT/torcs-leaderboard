<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TORCS UK Leaderboard</title>
    <style>
        /* Reset margins */
        body, html {
            margin: 0;
            padding: 0;
            background-color: #0b1a8f; /* Match the dark blue background */
            font-family: Arial, sans-serif;
            color: white;
        }

        /* This container maintains the 16:9 aspect ratio of your image */
        .leaderboard-container {
            position: relative;
            width: 100%;
            max-width: 1920px; /* Max width of your image */
            margin: 0 auto;
            aspect-ratio: 16 / 9; /* Keeps the box proportional */
            background-image: url('blank-board.png');
            background-size: cover;
            background-position: center;
        }

        /* This is the invisible overlay that holds your data */
        .data-overlay {
            position: absolute;
            /* YOU MAY NEED TO TWEAK THESE PERCENTAGES slightly 
               so the text perfectly aligns with your image's rows */
            top: 28.5%;    /* Distance from top to the first blue row */
            bottom: 13.5%; /* Distance from bottom to the last blue row */
            left: 13.5%;   /* Distance from left edge to the rank column */
            right: 9.3%;   /* Distance from right edge */
            
            display: grid;
            grid-template-rows: repeat(10, 1fr); /* 10 equal rows */
        }

        /* The layout for each row */
        .row {
            display: grid;
            /* NEW ALIGNMENT: 
               [Spacer] [Team] [Uni] [Badges] [Time] [LapVid] [TeamVid] */
            grid-template-columns: 10.5% 23% 25% 11% 14.5% 8% 8%;
            align-items: center; 
        }

        .cell {
            padding: 0 0.5vw; 
            font-size: 1.1vw; 
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); 
        }

        /* Center specific columns */
        .center-text { text-align: center; }

        /* Styling for the invisible links over the play buttons */
        .video-link {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
        }
        
        /* Make the link area cover the whole cell to hit the play button easily */
        .vid-cell {
            position: relative;
            cursor: pointer;
        }
        .vid-cell a {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        /* Optional: add a slight hover effect to the buttons */
        .vid-cell:hover { background-color: rgba(255,255,255,0.1); }

    </style>
</head>
<body>

    <div class="leaderboard-container">

            <!-- ROW 1 -->
